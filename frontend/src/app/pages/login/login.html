<div class="min-h-screen bg-gradient-to-br from-gray-50 to-gray-100 flex items-center justify-center pt-12">
  <div class="bg-white rounded-lg shadow-xl p-8 w-full max-w-md">
    <h1 class="text-3xl font-bold text-gray-900 mb-6 text-center">Login</h1>

    @if (errorMessage()) {
      <div class="mb-4 p-3 bg-red-100 border-l-4 border-red-500 text-red-700 rounded-lg">
        {{ errorMessage() }}
      </div>
    }

    <form (ngSubmit)="onLogin()" #loginForm="ngForm">
      <!-- Email Field -->
      <div class="mb-4">
        <label for="email" class="block text-gray-700 font-semibold mb-2">Email</label>
        <input
          id="email"
          type="email"
          [(ngModel)]="email"
          name="email"
          required
          [disabled]="isLoading()"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600 disabled:bg-gray-100"
          placeholder="your@email.com"
        />
      </div>

      <!-- Password Field -->
      <div class="mb-6">
        <label for="password" class="block text-gray-700 font-semibold mb-2">Password</label>
        <input
          id="password"
          type="password"
          [(ngModel)]="password"
          name="password"
          required
          [disabled]="isLoading()"
          class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-orange-600 disabled:bg-gray-100"
          placeholder="••••••••"
        />
      </div>

      <!-- Submit Button -->
      <button
        type="submit"
        [disabled]="!loginForm.valid || isLoading()"
        class="w-full bg-orange-500 text-white py-2 rounded-lg font-semibold hover:bg-orange-600 transition disabled:bg-gray-400"
      >
        {{ isLoading() ? 'Logging in...' : 'Login' }}
      </button>
    </form>

    <!-- Register Link -->
    <p class="text-center text-gray-600 mt-4">
      Don't have an account?
      <a routerLink="/register" class="text-orange-600 font-semibold hover:underline">Register here</a>
    </p>
  </div>
</div>
